<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martarapiin - Nota Jasa</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /*  Warna utama  */
  --purple:#D4548A;
  --purple-dark:#B03575;
  --purple-light:#FCE4EF;
  --purple-lighter:#F9C8DC;
  --gold:#F59E0B;
  --gold-dark:#D97706;
  --gold-light:#FEF3C7;
  --white:#fff;
  --gray:#6B7280;
  --gray-dark:#374151;
  --gray-light:#9CA3AF;
  --light:#F9FAFB;
  --bg:#fdf0f5;
  --border:#E5E7EB;
  --border-light:#F3F4F6;
  --danger:#EF4444;
  --danger-light:#FEE2E2;
  --danger-lighter:#FECACA;
  --success:#10B981;
  --success-light:#ECFDF5;
  --success-dark:#059669;
  --text-primary:#3d1a2e;
  --text-secondary:#374151;
  /*  Tipografi  */
  --font-base:'Poppins',sans-serif;
  --text-xs:11px;
  --text-sm:12px;
  --text-base:14px;
  --text-md:15px;
  --text-lg:16px;
  --text-xl:18px;
  --text-2xl:20px;
  --text-3xl:24px;
  --text-4xl:28px;
  /*  Spacing  */
  --sp-1:4px;
  --sp-2:8px;
  --sp-3:12px;
  --sp-4:16px;
  --sp-5:20px;
  --sp-6:24px;
  --sp-8:32px;
  --sp-10:40px;
  --sp-12:48px;
  /*  Radius  */
  --radius-sm:8px;
  --radius-md:10px;
  --radius-lg:12px;
  --radius-xl:16px;
  --radius-2xl:20px;
  --radius-3xl:24px;
  /*  Shadow  */
  --shadow-sm:0 2px 12px rgba(212,84,138,0.08);
  --shadow-md:0 4px 20px rgba(212,84,138,0.3);
  --shadow-lg:0 25px 50px rgba(212,84,138,0.3);
}
body{font-family:var(--font-base);background:var(--bg);min-height:100vh;color:var(--text-primary);font-size:var(--text-base);line-height:1.5}

/* LOGIN */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--purple-dark) 0%,var(--purple) 50%,#A78BFA 100%);padding:var(--sp-4)}
.login-card{background:var(--white);border-radius:var(--radius-3xl);padding:var(--sp-12) var(--sp-10);width:100%;max-width:400px;box-shadow:var(--shadow-lg);text-align:center}
.login-logo{font-size:48px;margin-bottom:var(--sp-2)}
.login-title{font-size:var(--text-4xl);font-weight:800;color:var(--purple-dark);margin-bottom:var(--sp-1)}
.login-sub{color:var(--gray);font-size:var(--text-base);margin-bottom:var(--sp-8)}
.login-input{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:var(--radius-lg);font-size:18px;font-family:var(--font-base);text-align:center;letter-spacing:8px;outline:none;transition:border-color 0.2s}
.login-input:focus{border-color:var(--purple)}
.login-btn{width:100%;margin-top:var(--sp-4);padding:14px;background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:var(--white);border:none;border-radius:var(--radius-lg);font-size:var(--text-lg);font-weight:600;font-family:var(--font-base);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(212,84,138,0.4)}
.login-error{color:var(--danger);font-size:var(--text-xs);margin-top:var(--sp-2);display:none}

/* MAIN APP */
#mainApp{display:none;min-height:100vh}
.topbar{background:linear-gradient(135deg,var(--purple-dark),var(--purple));padding:var(--sp-4) var(--sp-6);display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-md)}
.topbar-brand{display:flex;align-items:center;gap:var(--sp-2);color:var(--white)}
.topbar-brand .logo{font-size:28px}
.topbar-brand .name{font-size:var(--text-2xl);font-weight:800}
.topbar-brand .tagline{font-size:var(--text-xs);opacity:0.8;font-weight:300}
.logout-btn{background:rgba(255,255,255,0.15);color:var(--white);border:1px solid rgba(255,255,255,0.3);padding:var(--sp-2) var(--sp-4);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-base);font-size:var(--text-xs);transition:background 0.2s}
.logout-btn:hover{background:rgba(255,255,255,0.25)}

/* TABS */
.tabs{background:var(--white);border-bottom:2px solid var(--border);display:flex;padding:0 var(--sp-6);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:var(--sp-4) var(--sp-6);border:none;background:none;font-family:var(--font-base);font-size:var(--text-base);font-weight:500;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.tab-btn.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:600}
.tab-btn:hover{color:var(--purple)}

/* CONTENT */
.content{padding:var(--sp-6);max-width:900px;margin:0 auto}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius-xl);padding:var(--sp-6);margin-bottom:var(--sp-5);box-shadow:var(--shadow-sm)}
.card-title{font-size:var(--text-lg);font-weight:700;color:var(--purple-dark);margin-bottom:var(--sp-4);display:flex;align-items:center;gap:var(--sp-2)}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);margin-bottom:var(--sp-4)}
.form-row.single{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:var(--text-xs);font-weight:600;color:var(--gray-dark)}
.form-input,.form-select,.form-textarea{padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-base);font-size:var(--text-base);outline:none;transition:border-color 0.2s;background:var(--white)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--purple)}
.form-textarea{resize:vertical;min-height:80px}

/* STATUS BADGES */
.status-select{padding:var(--sp-2) 14px;border:2px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-base);font-size:var(--text-base);font-weight:600;outline:none;cursor:pointer}
.status-lunas{border-color:var(--success);color:var(--success);background:var(--success-light)}
.status-belum{border-color:var(--danger);color:var(--danger);background:#FEF2F2}
.status-dp{border-color:var(--gold);color:var(--gold);background:var(--gold-light)}

/* TABLE */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
.service-table{width:100%;border-collapse:collapse;margin-bottom:var(--sp-3);min-width:560px}
.service-table th{background:var(--purple-light);color:var(--purple-dark);font-size:var(--text-sm);font-weight:700;padding:10px var(--sp-2);text-align:left}
.service-table td{padding:var(--sp-2);border-bottom:1px solid var(--border-light);vertical-align:middle}
.service-table tr:hover td{background:var(--light)}
.service-table input,.service-table select{width:100%;padding:6px var(--sp-2);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-base);font-size:var(--text-xs);outline:none}
.service-table input:focus,.service-table select:focus{border-color:var(--purple)}
.del-btn{background:var(--danger-light);color:var(--danger);border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:var(--text-base);transition:background 0.2s}
.del-btn:hover{background:var(--danger-lighter)}

/* BUTTONS */
.btn{padding:10px var(--sp-5);border-radius:var(--radius-md);border:none;font-family:var(--font-base);font-size:var(--text-base);font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:var(--white)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(212,84,138,0.35)}
.btn-secondary{background:var(--purple-light);color:var(--purple-dark)}
.btn-secondary:hover{background:var(--purple-lighter)}
.btn-success{background:linear-gradient(135deg,var(--success),var(--success-dark));color:var(--white)}
.btn-success:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(16,185,129,0.35)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--white)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(245,158,11,0.35)}
.btn-danger{background:var(--danger-light);color:var(--danger)}
.btn-danger:hover{background:var(--danger-lighter)}
.btn-sm{padding:7px 14px;font-size:var(--text-sm)}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:var(--sp-2)}

/* TOTAL */
.total-section{background:linear-gradient(135deg,var(--purple-light),var(--purple-lighter));border-radius:var(--radius-lg);padding:var(--sp-4) var(--sp-5);display:flex;justify-content:space-between;align-items:center;margin-top:var(--sp-2)}
.total-label{font-size:var(--text-md);font-weight:600;color:var(--purple-dark)}
.total-amount{font-size:var(--text-3xl);font-weight:800;color:var(--purple-dark)}

/* HISTORY */
.nota-card{background:var(--white);border-radius:var(--radius-lg);padding:var(--sp-4) var(--sp-5);margin-bottom:var(--sp-3);border:2px solid var(--border);cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center;gap:var(--sp-3)}
.nota-card:hover{border-color:var(--purple);box-shadow:0 4px 16px rgba(212,84,138,0.15)}
.nota-info .nota-num{font-weight:700;color:var(--purple-dark);font-size:var(--text-md)}
.nota-info .nota-customer{color:var(--gray-dark);font-size:var(--text-base);margin-top:2px}
.nota-info .nota-date{color:var(--gray);font-size:var(--text-sm);margin-top:2px}
.nota-right{text-align:right;flex-shrink:0}
.nota-total{font-weight:700;color:var(--purple-dark);font-size:var(--text-lg)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:var(--text-xs);font-weight:600;margin-top:var(--sp-1)}
.badge-lunas{background:var(--success-light);color:var(--success)}
.badge-belum{background:#FEF2F2;color:var(--danger)}
.badge-dp{background:var(--gold-light);color:var(--gold)}
.empty-state{text-align:center;padding:var(--sp-12) var(--sp-6);color:var(--gray-light)}
.empty-state .empty-icon{font-size:48px;margin-bottom:var(--sp-3)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:var(--sp-4)}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:var(--radius-2xl);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,0.3)}
.modal-header{padding:var(--sp-5) var(--sp-6);border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--white);z-index:1}
.modal-header h3{font-size:var(--text-xl);font-weight:700;color:var(--purple-dark)}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--gray);line-height:1}
.modal-body{padding:var(--sp-6)}
.modal-footer{padding:var(--sp-4) var(--sp-6);border-top:2px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

/* NOTA PREVIEW */
.nota-preview{background:var(--white);padding:var(--sp-8);font-family:var(--font-base);max-width:600px;margin:0 auto}
.nota-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--sp-6);padding-bottom:var(--sp-5);border-bottom:3px solid var(--purple)}
.nota-brand .brand-name{font-size:var(--text-3xl);font-weight:800;color:var(--purple-dark)}
.nota-brand .brand-tagline{font-size:var(--text-xs);color:var(--gray);margin-top:2px}
.nota-brand .brand-wa{font-size:var(--text-sm);color:var(--purple);margin-top:var(--sp-1);font-weight:600}
.nota-meta{text-align:right}
.nota-meta .nota-number{font-size:var(--text-base);font-weight:700;color:var(--purple-dark)}
.nota-meta .nota-date-text{font-size:var(--text-sm);color:var(--gray);margin-top:var(--sp-1)}
.nota-customer-section{background:var(--purple-light);border-radius:var(--radius-md);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-5)}
.nota-customer-section .label{font-size:var(--text-xs);color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.nota-customer-section .value{font-size:var(--text-lg);font-weight:700;color:var(--text-primary);margin-top:2px}
.nota-table{width:100%;border-collapse:collapse;margin-bottom:var(--sp-4)}
.nota-table th{background:var(--purple-dark);color:var(--white);padding:10px var(--sp-3);font-size:var(--text-sm);font-weight:600;text-align:left}
.nota-table td{padding:10px var(--sp-3);border-bottom:1px solid var(--border);font-size:var(--text-xs)}
.nota-table tr:nth-child(even) td{background:var(--light)}
.nota-table .text-right{text-align:right}
.nota-total-row{background:var(--purple-light)!important}
.nota-total-row td{font-weight:700;color:var(--purple-dark);font-size:var(--text-base);border-bottom:none!important}
.nota-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:var(--sp-5);padding-top:var(--sp-4);border-top:2px solid var(--border)}
.nota-status-box{padding:var(--sp-2) var(--sp-5);border-radius:var(--radius-sm);font-weight:700;font-size:var(--text-base)}
.nota-status-lunas{background:var(--success-light);color:var(--success);border:2px solid var(--success)}
.nota-status-belum{background:#FEF2F2;color:var(--danger);border:2px solid var(--danger)}
.nota-status-dp{background:var(--gold-light);color:var(--gold);border:2px solid var(--gold)}
.nota-notes{font-size:var(--text-sm);color:var(--gray);max-width:300px}
.nota-notes .notes-label{font-weight:600;color:var(--gray-dark);margin-bottom:var(--sp-1)}
.nota-watermark{text-align:center;margin-top:var(--sp-5);padding-top:var(--sp-3);border-top:1px dashed var(--border);font-size:var(--text-xs);color:var(--gray-light)}

/* INFO PEMBAYARAN & QRIS */
.nota-payment{text-align:center;margin-top:var(--sp-5);padding-top:var(--sp-4);border-top:1px dashed var(--border)}
.nota-payment-title{font-size:var(--text-base);font-weight:700;color:var(--text-primary);margin-bottom:var(--sp-2)}
.nota-payment-text{font-size:var(--text-sm);color:var(--gray);line-height:1.7}
.nota-qris-wrap{margin-top:var(--sp-4);display:flex;justify-content:center}
.nota-qris-img{width:220px;height:auto;max-width:100%;object-fit:contain;border:1px solid var(--border);border-radius:var(--radius-sm)}
.nota-qris-placeholder{display:none;width:180px;height:180px;border:2px dashed var(--border);border-radius:var(--radius-sm);align-items:center;justify-content:center;background:var(--light)}
.nota-qris-placeholder-inner{text-align:center;color:var(--gray)}

/*  RESPONSIVE  */

/* Tablet kecil & ponsel besar:  768px */
@media(max-width:768px){
  .content{padding:var(--sp-4)}
  .card{padding:var(--sp-4)}
  .form-row{grid-template-columns:1fr 1fr}
  .modal{border-radius:var(--radius-xl)}
  .modal-body{padding:var(--sp-4)}
  .modal-footer{padding:var(--sp-3) var(--sp-4)}
  .total-amount{font-size:var(--text-xl)}
}

/* Ponsel:  640px */
@media(max-width:640px){
  .form-row{grid-template-columns:1fr}
  .content{padding:var(--sp-3)}
  .card{padding:var(--sp-3);border-radius:var(--radius-lg)}
  .topbar{padding:var(--sp-3) var(--sp-4)}
  .topbar-brand .name{font-size:var(--text-lg)}
  .topbar-brand .tagline{display:none}
  .tabs{padding:0 var(--sp-3)}
  .tab-btn{padding:var(--sp-3) var(--sp-4);font-size:var(--text-sm)}
  /* Tabel layanan: scroll horizontal pada layar kecil */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .service-table{font-size:var(--text-xs);min-width:520px}
  .service-table th,.service-table td{padding:6px var(--sp-1)}
  .btn-group{gap:var(--sp-2)}
  .btn{padding:9px var(--sp-4);font-size:var(--text-sm)}
  .btn-sm{padding:6px var(--sp-3);font-size:var(--text-xs)}
  .nota-header{flex-direction:column;gap:var(--sp-3)}
  .nota-meta{text-align:left}
  .nota-footer{flex-direction:column;gap:var(--sp-3)}
  .nota-card{flex-direction:column;align-items:flex-start;gap:var(--sp-2)}
  .nota-right{text-align:left}
  .modal{border-radius:var(--radius-xl) var(--radius-xl) 0 0;max-height:95vh;margin-top:auto}
  .modal-overlay{align-items:flex-end;padding:0}
  .total-section{flex-direction:column;align-items:flex-start;gap:var(--sp-1)}
  .total-amount{font-size:var(--text-xl)}
  .login-card{padding:var(--sp-8) var(--sp-6);border-radius:var(--radius-2xl)}
  .login-title{font-size:var(--text-3xl)}
}

/* Ponsel sangat kecil:  400px */
@media(max-width:400px){
  .content{padding:var(--sp-2)}
  .card{padding:var(--sp-3)}
  .topbar-brand .logo{font-size:22px}
  .topbar-brand .name{font-size:var(--text-base)}
  .tab-btn{padding:var(--sp-3) var(--sp-3);font-size:var(--text-xs)}
  .btn-group{flex-direction:column}
  .btn{width:100%;justify-content:center}
  .login-card{padding:var(--sp-6) var(--sp-4)}
  .login-title{font-size:var(--text-2xl)}
  .login-sub{font-size:var(--text-xs)}
}

/* Tablet: 769px  1024px */
@media(min-width:769px) and (max-width:1024px){
  .content{padding:var(--sp-5);max-width:860px}
  .form-row{gap:var(--sp-3)}
}

/* Desktop lebar:  1280px */
@media(min-width:1280px){
  .content{max-width:960px}
  .card{padding:var(--sp-8)}
  .form-row{gap:var(--sp-5)}
}

/* Desktop sangat lebar:  1920px */
@media(min-width:1920px){
  .content{max-width:1100px}
  body{font-size:15px}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo"></div>
    <div class="login-title">Martarapiin</div>
    <div class="login-sub">Jasa Pengetikan & Editing Dokumen</div>
    <input type="password" id="loginInput" class="login-input" placeholder="" maxlength="10" autocomplete="off">
    <div id="loginError" class="login-error"> Password salah. Coba lagi.</div>
    <button class="login-btn" onclick="doLogin()"> Masuk</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-brand">
      <span class="logo"></span>
      <div>
        <div class="name">Martarapiin</div>
        <div class="tagline">Pembuat Nota Akses Terbatas</div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()"> Keluar</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabBuat" onclick="switchTab('buat')"> Buat Nota</button>
    <button class="tab-btn" id="tabRiwayat" onclick="switchTab('riwayat')"> Riwayat</button>
  </div>

  <!-- TAB BUAT NOTA -->
  <div id="pageBuat" class="content">
    <div class="card">
      <div class="card-title"> Informasi Nota</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nomor Nota</label>
          <input type="text" id="notaNumber" class="form-input" readonly style="background:#F3F4F6;font-weight:700;color:#B03575">
        </div>
        <div class="form-group">
          <label class="form-label">Tanggal & Waktu</label>
          <input type="datetime-local" id="notaDate" class="form-input">
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label class="form-label"> Nama Pelanggan</label>
          <input type="text" id="customerName" class="form-input" placeholder="Masukkan nama pelanggan...">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"> Daftar Layanan</div>
      <div class="table-scroll">
        <table class="service-table" id="serviceTable">
          <thead>
            <tr>
              <th style="min-width:160px">Layanan</th>
              <th style="min-width:140px">Keterangan</th>
              <th style="min-width:80px">Qty/Hal</th>
              <th style="min-width:110px">Harga Satuan</th>
              <th style="min-width:110px">Subtotal</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody id="serviceBody"></tbody>
        </table>
      </div>

<script>
//  AuthModule 
// Mirrors logic in src/auth.js (inlined so index.html runs without a bundler).

const SESSION_KEY = 'martarapiin_session';
const VALID_PASSWORDS = ['050603', '160304'];

/**
 * Validates the entered password and stores a session token if valid.
 * Called by the login button's onclick handler.
 */
function doLogin() {
  const password = document.getElementById('loginInput').value;
  if (VALID_PASSWORDS.includes(password)) {
    sessionStorage.setItem(SESSION_KEY, 'active');

  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginInput').value = '';
    document.getElementById('loginInput').focus();

}

  sessionStorage.removeItem(SESSION_KEY);

}

/**
 * Checks whether an active session exists.

 */

//  CalculatorModule 
// Mirrors logic in src/calculator.js (inlined so index.html runs without a bundler).

const PRICING_RULES = {
  'Nomor Halaman':  { type: 'per_file', rate: 10000 },
  'Daftar': { type: 'per_file', rate: 10000 },
  'Bookmark PDF':   { type: 'fixed',    rate: 15000 },
  'Footnote':       { type: 'per_file', rate: 20000 },
  'Merapikan':      { type: 'tiered',   base: 15000, threshold: 100, extra: 200 },
  'Cek Typo':       { type: 'tiered',   base: 10000, threshold: 100, extra: 150 },
  'Daftar Pustaka': { type: 'per_file', rate: 20000 },
};

/** Returns true when value is a positive integer ( 1). */
function isValidPages(value) {
  return typeof value === 'number' && Number.isInteger(value) && value >= 1;
}

/**
 * Calculates the price for a single service.
 * @param {string} serviceType
 * @param {number|null} pages
 * @returns {number|null}
 */
function calculateServicePrice(serviceType, pages) {
  const rule = PRICING_RULES[serviceType];
  if (!rule) return null;
  if (rule.type === 'fixed') return rule.rate;
  if (!isValidPages(pages)) return null;
  if (rule.type === 'per_file') return rule.rate;
  if (rule.type === 'tiered') {
    return pages <= rule.threshold
      ? rule.base
      : rule.base + (pages - rule.threshold) * rule.extra;
  }
  return null;
}

/**
 * Sums all subtotals from an array of service items.
 * @param {Array<{subtotal:number}>} services
 * @returns {number}
 */
function calculateTotal(services) {
  if (!Array.isArray(services)) return 0;
  return services.reduce((sum, item) => sum + (item.subtotal ?? 0), 0);
}

/**
 * Formats a number as Indonesian Rupiah string.
 * @param {number} amount
 * @returns {string}  e.g. "Rp 15.000"
 */
function formatRupiah(amount) {
  return 'Rp ' + amount.toLocaleString('id-ID');
}

//  FormModule 

/** Service types that require a page-count input. */
const SERVICES_WITH_PAGES = [
  'Nomor Halaman', 'Daftar Lengkap', 'Footnote',
  'Merapikan', 'Cek Typo', 'Daftar Pustaka',
];

/** All available service types (order matches the dropdown). */
const ALL_SERVICES = [
  'Nomor Halaman', 'Daftar Lengkap', 'Bookmark PDF',
  'Footnote', 'Merapikan', 'Cek Typo', 'Daftar Pustaka',
];

/**
 * Generates a nota number in the format MRP-YYYYMMDD-XXX.
 * The sequence counter is derived from the current millisecond to keep it
 * unique within a session; it is padded to 3 digits.
 * @returns {string}
 */
function generateNotaNumber() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const seq = String(Math.floor(Math.random() * 900) + 100); // 100999
  return `MRP-${y}${m}${d}-${seq}`;
}

/**
 * Validates the form before saving or previewing.
 * Returns an object { valid: boolean, message: string }.
 */
function validateForm() {
  const customerName = document.getElementById('customerName').value.trim();
  if (!customerName) {
    return { valid: false, message: 'Nama pelanggan tidak boleh kosong.' };
  }
  const rows = document.querySelectorAll('#serviceBody tr');
  if (rows.length === 0) {
    return { valid: false, message: 'Tambahkan minimal satu layanan.' };
  }
  // Check that every row has a valid price (no null subtotals)
  let hasInvalid = false;
  rows.forEach(row => {
    const errEl = row.querySelector('.row-error');
    if (errEl && errEl.textContent.trim() !== '') hasInvalid = true;
  });
  if (hasInvalid) {
    return { valid: false, message: 'Perbaiki input halaman yang tidak valid sebelum menyimpan.' };
  }
  return { valid: true, message: '' };
}

/**
 * Builds the HTML for a single service table row.
 * @param {number} index - Row index (0-based)
 * @returns {HTMLTableRowElement}
 */
function buildRow(index) {
  const tr = document.createElement('tr');
  tr.dataset.index = index;

  // Service type dropdown
  const serviceOptions = ALL_SERVICES
    .map(s => `<option value="${s}">${s}</option>`)
    .join('');

  tr.innerHTML = `
    <td>
      <select class="svc-type" onchange="updateRow(${index})">
        ${serviceOptions}
      </select>
    </td>
    <td>
      <input type="text" class="svc-desc" placeholder="Keterangan..." oninput="recalculate()">
    </td>
    <td>
      <input type="number" class="svc-pages" min="1" step="1"
             placeholder="Halaman" oninput="updateRow(${index})">
      <div class="row-error" style="color:#EF4444;font-size:11px;margin-top:2px"></div>
    </td>
    <td class="svc-unit-price" style="font-weight:600;color:#B03575">Rp 0</td>
    <td class="svc-subtotal" style="font-weight:700;color:#B03575">Rp 0</td>
    <td>
      <button class="del-btn" onclick="removeRow(${index})" title="Hapus baris"></button>
    </td>
  `;

  return tr;
}

/**
 * Adds a new service row to #serviceBody and triggers recalculation.
 */
function addRow() {
  const tbody = document.getElementById('serviceBody');
  const index = tbody.rows.length;
  const tr = buildRow(index);
  tbody.appendChild(tr);
  // Show/hide pages input based on default selected service
  updateRow(index);
}

/**
 * Removes the row at the given index and re-indexes remaining rows,
 * then triggers recalculation.
 * @param {number} index
 */
function removeRow(index) {
  const tbody = document.getElementById('serviceBody');
  const rows = Array.from(tbody.rows);
  const target = rows.find(r => parseInt(r.dataset.index) === index);
  if (target) {
    tbody.removeChild(target);
  }
  // Re-index remaining rows so onclick handlers stay correct
  Array.from(tbody.rows).forEach((row, i) => {
    row.dataset.index = i;
    const sel = row.querySelector('.svc-type');
    if (sel) sel.setAttribute('onchange', `updateRow(${i})`);
    const pagesInput = row.querySelector('.svc-pages');
    if (pagesInput) pagesInput.setAttribute('oninput', `updateRow(${i})`);
    const delBtn = row.querySelector('.del-btn');
    if (delBtn) delBtn.setAttribute('onclick', `removeRow(${i})`);
  });
  recalculate();
}

/**
 * Updates a row's display (show/hide pages input, recalculate price)
 * whenever the service type or page count changes.
 * @param {number} index
 */
function updateRow(index) {
  const tbody = document.getElementById('serviceBody');
  const row = Array.from(tbody.rows).find(r => parseInt(r.dataset.index) === index);
  if (!row) return;

  const serviceType = row.querySelector('.svc-type').value;
  const pagesInput  = row.querySelector('.svc-pages');
  const errorEl     = row.querySelector('.row-error');
  const needsPages  = SERVICES_WITH_PAGES.includes(serviceType);

  // Show or hide the pages input
  pagesInput.style.display = needsPages ? 'block' : 'none';

  if (!needsPages) {
    // Fixed-price service  clear any previous validation error
    pagesInput.value = '';
    errorEl.textContent = '';
  } else {
    // Validate pages input
    const rawVal = pagesInput.value;
    if (rawVal === '' || rawVal === null) {
      errorEl.textContent = '';
    } else {
      const parsed = Number(rawVal);
      if (!isValidPages(parsed)) {
        errorEl.textContent = 'Masukkan jumlah halaman yang valid (angka  1)';
      } else {
        errorEl.textContent = '';
      }
    }
  }

  recalculate();
}

/**
 * Recalculates all row subtotals and the grand total, then updates the DOM.
 * Called on every input change in the service table.
 */
function recalculate() {
  const tbody = document.getElementById('serviceBody');
  let grandTotal = 0;

  Array.from(tbody.rows).forEach(row => {
    const serviceType  = row.querySelector('.svc-type').value;
    const pagesInput   = row.querySelector('.svc-pages');
    const unitPriceEl  = row.querySelector('.svc-unit-price');
    const subtotalEl   = row.querySelector('.svc-subtotal');
    const errorEl      = row.querySelector('.row-error');
    const needsPages   = SERVICES_WITH_PAGES.includes(serviceType);

    let pages = null;
    if (needsPages) {
      const rawVal = pagesInput.value;
      if (rawVal !== '' && rawVal !== null) {
        const parsed = Number(rawVal);
        pages = isValidPages(parsed) ? parsed : null;
      }
    }

    const price = calculateServicePrice(serviceType, pages);

    if (price === null) {
      // Invalid or missing pages  show 0 but don't add to total
      unitPriceEl.textContent = 'Rp 0';
      subtotalEl.textContent  = 'Rp 0';
      // Only show error if user has typed something invalid
      if (needsPages && pagesInput.value !== '') {
        const parsed = Number(pagesInput.value);
        if (!isValidPages(parsed)) {
          errorEl.textContent = 'Masukkan jumlah halaman yang valid (angka  1)';
        }
      }
    } else {
      unitPriceEl.textContent = formatRupiah(price);
      subtotalEl.textContent  = formatRupiah(price);
      grandTotal += price;
      if (errorEl) errorEl.textContent = '';
    }
  });

  document.getElementById('grandTotal').textContent = formatRupiah(grandTotal);
}

/**
 * Resets the form to a blank state with a new nota number and today's date/time.
 */
function newNota() {
  document.getElementById('notaNumber').value = generateNotaNumber();

  // Set current date-time in datetime-local format (YYYY-MM-DDTHH:MM)
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const localISO = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('notaDate').value = localISO;

  document.getElementById('customerName').value = '';

  document.getElementById('serviceBody').innerHTML = '';
  document.getElementById('grandTotal').textContent = 'Rp 0';

  // Start with one empty row
  addRow();
}

//  DownloadModule 
// Mirrors logic in src/download.js (inlined so index.html runs without a bundler).

/**
 * Generates a JPG filename in the format `nota-[nama-klien]-[tanggal].jpg`.
 * Customer name is normalised: lowercase, spaces  hyphens, non-alphanumeric removed.
 * @param {string} customerName
 * @param {string|Date} date
 * @returns {string}
 */
function generateFileName(customerName, date) {
  const normalizedName = String(customerName)
    .toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9-]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');

  const d = date instanceof Date ? date : new Date(date);
  const year  = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day   = String(d.getDate()).padStart(2, '0');
  const formattedDate = `${year}${month}${day}`;

  return `nota-${normalizedName}-${formattedDate}.jpg`;
}

//  PreviewModule 

/**
 * Collects current form data into a NotaData-shaped object.
 * @returns {Object} notaData
 */
function collectFormData() {
  const services = [];
  Array.from(document.querySelectorAll('#serviceBody tr')).forEach(row => {
    const serviceType = row.querySelector('.svc-type').value;
    const description = row.querySelector('.svc-desc').value.trim();
    const pagesInput  = row.querySelector('.svc-pages');
    const needsPages  = SERVICES_WITH_PAGES.includes(serviceType);

    let pages = null;
    if (needsPages && pagesInput.value !== '') {
      const parsed = Number(pagesInput.value);
      if (isValidPages(parsed)) pages = parsed;
    }

    const unitPrice = calculateServicePrice(serviceType, pages) ?? 0;
    services.push({
      type:        serviceType,
      description: description,
      pages:       pages,
      unitPrice:   unitPrice,
      subtotal:    unitPrice,
    });
  });

  const dateRaw = document.getElementById('notaDate').value;

  return {
    id:           Date.now().toString(),
    number:       document.getElementById('notaNumber').value,
    date:         dateRaw,
    customerName: document.getElementById('customerName').value.trim(),
    services:     services,
    total:        calculateTotal(services),
    createdAt:    new Date().toISOString(),
  };
}

/**
 * Collects form data, builds the nota HTML, and shows the preview modal.
 * Requires: form must pass validateForm() before calling.
 */
function previewNota() {
  const validation = validateForm();
  if (!validation.valid) {
    alert(validation.message);
    return;
  }

  const notaData = collectFormData();
  const container = document.getElementById('notaPreviewContent');
  container.innerHTML = buildNotaHTML(notaData);

  document.getElementById('previewModal').classList.add('show');
}

//  DownloadModule (JPG export) 

/**
 * Converts the nota preview element to a JPG and triggers a browser download.
 * Uses html2canvas with scale:3 to produce 1080px output.
 * Wraps in try-catch and shows an error message if generation fails.
 */
async function downloadJPG() {
  // Target the rendered nota card inside the preview container
  const container = document.getElementById('notaPreviewContent');
  const element   = container ? container.querySelector('.nota-preview') : null;
  if (!element) {
    alert('Tidak ada pratinjau nota untuk diunduh. Buka pratinjau terlebih dahulu.');
    return;
  }

  // Derive customer name and date for the filename
  const customerEl   = element.querySelector('.nota-customer-section .value');
  const customerName = customerEl ? customerEl.textContent.trim() : 'pelanggan';
  const fileDate     = new Date();
  const fileName     = generateFileName(customerName, fileDate);

  try {
    const canvas = await html2canvas(element, {
      scale:           3,
      useCORS:         true,
      allowTaint:      true,
      backgroundColor: '#ffffff',
      logging:         false,
    });

    const link    = document.createElement('a');
    link.download = fileName;
    link.href     = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  } catch (err) {
    console.error('html2canvas error:', err);
    alert('Gagal membuat file JPG. Silakan coba lagi.');
  }
}

function printNota() {
  window.print();
}

//  HistoryModule 
// Mirrors logic in src/history.js (inlined so index.html runs without a bundler).

const HISTORY_KEY = 'martarapiin_history';

/**
 * Checks whether localStorage is available in the current browser context.
 * Returns false in private-browsing modes that block storage access.
 * @returns {boolean}
 */
function isLocalStorageAvailable() {
  try {
    const testKey = '__martarapiin_test__';
    localStorage.setItem(testKey, '1');
    localStorage.removeItem(testKey);
    return true;
  } catch {
    return false;
  }
}

/**
 * Reads the raw nota array from localStorage.
 * Returns an empty array if storage is unavailable or data is corrupt.
 * @returns {Array<Object>}
 */
function readHistoryRaw() {
  if (!isLocalStorageAvailable()) return [];
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

/**
 * Loads all saved notas, sorted descending by createdAt (newest first).
 * @returns {Array<Object>}
 */
function loadHistory() {
  return readHistoryRaw().slice().sort((a, b) => {
    return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
  });
}

/**
 * Saves a new nota to localStorage.
 * Throws on QuotaExceededError so the caller can show a user-friendly message.
 * @param {Object} notaData
 */
function persistNota(notaData) {
  if (!isLocalStorageAvailable()) {
    throw new Error('localStorage tidak tersedia di browser ini.');
  }
  const history = readHistoryRaw();
  history.push(notaData);
  // May throw DOMException (QuotaExceededError)  propagated to caller
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

/**
 * Deletes a nota by ID from localStorage and re-renders the history list.
 * @param {string} notaId
 */
function deleteNotaById(notaId) {
  if (!isLocalStorageAvailable()) return;
  const history = readHistoryRaw();
  const filtered = history.filter(n => n.id !== notaId);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(filtered));
}

// Tracks the nota ID currently shown in the detail modal
let _currentDetailNotaId = null;

/**
 * Validates the form, collects data, saves to localStorage, resets the form,
 * and switches to the Riwayat tab.
 * Handles QuotaExceededError and unavailable localStorage gracefully.
 */
function saveNota() {
  const validation = validateForm();
  if (!validation.valid) {
    alert(validation.message);
    return;
  }

  const notaData = collectFormData();

  try {
    persistNota(notaData);
  } catch (err) {
    if (err instanceof DOMException && err.name === 'QuotaExceededError') {
      alert('Penyimpanan penuh. Hapus beberapa nota lama untuk melanjutkan.');
    } else {
      alert('Riwayat tidak dapat disimpan: ' + err.message);
    }
    return;
  }

  // Reset form and navigate to history tab
  newNota();
  switchTab('riwayat');
  renderHistory();
}

/**
 * Renders the list of saved notas into #historyList.
 * Shows an empty-state message when there are no saved notas.
 */
function renderHistory() {
  const container = document.getElementById('historyList');
  if (!container) return;

  if (!isLocalStorageAvailable()) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"></div>
        <div>Riwayat tidak tersedia  localStorage tidak didukung di browser ini.</div>
      </div>`;
    return;
  }

  const history = loadHistory();

  if (history.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"></div>
        <div style="font-weight:600;font-size:15px;margin-bottom:6px">Belum ada nota tersimpan</div>
        <div style="font-size:13px">Buat nota baru di tab "Buat Nota" dan klik Simpan.</div>
      </div>`;
    return;
  }

  const formatDisplayDate = iso => {
    try {
      return new Date(iso).toLocaleDateString('id-ID', {
        day: '2-digit', month: 'short', year: 'numeric'
      });
    } catch {
      return iso;
    }
  };

  container.innerHTML = history.map(nota => `
    <div class="nota-card" onclick="showDetail('${nota.id}')" role="button" tabindex="0"
         onkeydown="if(event.key==='Enter'||event.key===' ')showDetail('${nota.id}')">
      <div class="nota-info">
        <div class="nota-num">${nota.number}</div>
        <div class="nota-customer"> ${nota.customerName}</div>
        <div class="nota-date"> ${formatDisplayDate(nota.createdAt)}</div>
      </div>
      <div class="nota-right">
        <div class="nota-total">${formatRupiah(nota.total)}</div>
      </div>
    </div>`).join('');
}

/**
 * Opens the detail modal for the nota with the given ID.
 * @param {string} notaId
 */
function showDetail(notaId) {
  const history = loadHistory();
  const nota = history.find(n => n.id === notaId);
  if (!nota) return;

  _currentDetailNotaId = notaId;

  const container = document.getElementById('detailPreviewContent');
  container.innerHTML = buildNotaHTML(nota);

  document.getElementById('detailModal').classList.add('show');
}

/**
 * Downloads a JPG of the nota currently shown in the detail modal.
 */
async function downloadJPGFromDetail() {
  const container = document.getElementById('detailPreviewContent');
  const element   = container ? container.querySelector('.nota-preview') : null;
  if (!element) {
    alert('Tidak ada nota untuk diunduh.');
    return;
  }

  const customerEl   = element.querySelector('.nota-customer-section .value');
  const customerName = customerEl ? customerEl.textContent.trim() : 'pelanggan';
  const fileName     = generateFileName(customerName, new Date());

  try {
    const canvas = await html2canvas(element, {
      scale:           3,
      useCORS:         true,
      allowTaint:      true,
      backgroundColor: '#ffffff',
      logging:         false,
    });

    const link    = document.createElement('a');
    link.download = fileName;
    link.href     = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  } catch (err) {
    console.error('html2canvas error:', err);
    alert('Gagal membuat file JPG. Silakan coba lagi.');
  }
}

/**
 * Deletes the nota currently shown in the detail modal, closes the modal,
 * and re-renders the history list.
 */
function deleteFromDetail() {
  if (!_currentDetailNotaId) return;

  if (!confirm('Hapus nota ini dari riwayat? Tindakan ini tidak dapat dibatalkan.')) return;

  deleteNotaById(_currentDetailNotaId);
  _currentDetailNotaId = null;

  closeModal('detailModal');
  renderHistory();
}

//  Initialisation 
document.addEventListener('DOMContentLoaded', function () {
  checkSession();
  newNota(); // Initialise form with a fresh nota number and one empty row
});
</script>
</body>
</html>
